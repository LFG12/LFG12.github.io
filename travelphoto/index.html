<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>照片地图</title>
	<!-- 引入天地图API -->
	<script type="text/javascript" src="https://api.tianditu.gov.cn/api?v=4.0&tk=a5c42978292b960f4c9f1bbac5ed984c">
	</script>
	<style>
		#map {
			height: 1080px;
		}
	</style>
</head>

<body>

	<div id="map"></div>

	<script>
		window.onload = function () {
			// 初始化天地图
			var map = new T.Map("map");

			// 设置地图中心和缩放级别（以中华人民共和国为例）
			//var chinaCenter = new T.LngLat(104.195397, 35.861660); // 中国中心的经纬度坐标
			//map.centerAndZoom(chinaCenter, 5);

			// 添加地图控件
			map.addControl(new T.Control.Scale());
			map.addControl(new T.Control.Zoom());

			// 使用相对路径表示当前目录
			var currentPath = '../images/';
			var json_data = '[{"filename": "IMG_20230113_095559.jpg", "latitude": 36.32878055555556, "longitude": 116.05024722222223}, {"filename": "IMG_20230116_081911.jpg", "latitude": 36.354102777777776, "longitude": 115.92832777777778}, {"filename": "IMG_20230225_164846.jpg", "latitude": 30.557772222222223, "longitude": 114.27356944444445}, {"filename": "IMG_20230429_091252.jpg", "latitude": 30.757455555555556, "longitude": 120.75557777777777}, {"filename": "IMG_20230429_091307.jpg", "latitude": 30.757466666666666, "longitude": 120.75541666666666}, {"filename": "IMG_20230429_101242.jpg", "latitude": 30.74967777777778, "longitude": 120.75695833333333}, {"filename": "IMG_20230429_112840.jpg", "latitude": 30.74988888888889, "longitude": 120.75704166666667}, {"filename": "IMG_20230429_164055(1).jpg", "latitude": 31.24406666666667, "longitude": 121.48655277777777}, {"filename": "IMG_20230429_164055.jpg", "latitude": 31.24406666666667, "longitude": 121.48655277777777}, {"filename": "IMG_20230429_184252.jpg", "latitude": 31.239741666666667, "longitude": 121.48584166666667}, {"filename": "IMG_20230429_190836.jpg", "latitude": 31.23836111111111, "longitude": 121.48651944444444}, {"filename": "IMG_20230429_191053.jpg", "latitude": 31.238369444444444, "longitude": 121.48651666666667}, {"filename": "IMG_20230429_191452(1).jpg", "latitude": 31.237572222222223, "longitude": 121.48676388888889}, {"filename": "IMG_20230429_191535.jpg", "latitude": 31.237402777777778, "longitude": 121.48679444444444}, {"filename": "IMG_20230429_191544.jpg", "latitude": 31.237397222222224, "longitude": 121.48676944444445}, {"filename": "IMG_20230429_202023.jpg", "latitude": 31.236630555555557, "longitude": 121.500875}, {"filename": "IMG_20230429_203742.jpg", "latitude": 31.23862777777778, "longitude": 121.49983888888889}, {"filename": "IMG_20230430_080352.jpg", "latitude": 31.02439722222222, "longitude": 121.4409}, {"filename": "IMG_20230430_090857.jpg", "latitude": 31.026325, "longitude": 121.42082777777779}, {"filename": "IMG_20230430_092842.jpg", "latitude": 31.02891111111111, "longitude": 121.42436388888889}, {"filename": "IMG_20230430_103600.jpg", "latitude": 31.02355, "longitude": 121.42430277777778}, {"filename": "IMG_20230430_143723.jpg", "latitude": 31.028688888888887, "longitude": 121.43721388888889}, {"filename": "IMG_20230503_083111.jpg", "latitude": 31.238675, "longitude": 121.4864861111111}, {"filename": "IMG_20230512_234022.jpg", "latitude": 30.75725277777778, "longitude": 120.75634722222222}, {"filename": "IMG_20230709_111252.jpg", "latitude": 30.538008333333334, "longitude": 114.353675}, {"filename": "IMG_20230709_113119.jpg", "latitude": 30.538605555555556, "longitude": 114.35827222222221}, {"filename": "IMG_20230709_114203.jpg", "latitude": 30.538844444444447, "longitude": 114.36146111111111}, {"filename": "IMG_20230709_114325.jpg", "latitude": 30.538536111111114, "longitude": 114.36167499999999}, {"filename": "IMG_20230709_132103.jpg", "latitude": 30.52938611111111, "longitude": 114.35502222222222}, {"filename": "IMG_20230709_133743.jpg", "latitude": 30.52766388888889, "longitude": 114.35569722222222}, {"filename": "IMG_20230709_142734.jpg", "latitude": 30.566308333333335, "longitude": 114.35997499999999}, {"filename": "IMG_20230722_144126.jpg", "latitude": 34.37496111111111, "longitude": 108.93501388888889}, {"filename": "IMG_20230722_153444.jpg", "latitude": 34.224580555555555, "longitude": 108.94126111111112}, {"filename": "IMG_20230722_204505.jpg", "latitude": 34.219833333333334, "longitude": 108.95813055555556}, {"filename": "IMG_20230722_211643.jpg", "latitude": 34.21270833333334, "longitude": 108.95931944444445}, {"filename": "IMG_20230723_161446.jpg", "latitude": 34.18758888888888, "longitude": 108.85875555555555}, {"filename": "IMG_20230723_174852.jpg", "latitude": 34.18703333333333, "longitude": 108.85853888888889}, {"filename": "IMG_20230805_145930.jpg", "latitude": 30.67108888888889, "longitude": 114.27586388888889}, {"filename": "IMG_20230826_112318.jpg", "latitude": 30.552641666666666, "longitude": 114.2819}, {"filename": "IMG_20230826_113135.jpg", "latitude": 30.549508333333335, "longitude": 114.28746111111111}, {"filename": "IMG_20230826_160626.jpg", "latitude": 30.54731388888889, "longitude": 114.29486944444444}, {"filename": "IMG_20230826_162742.jpg", "latitude": 30.549694444444444, "longitude": 114.28971944444444}, {"filename": "IMG_20231211_105429.jpg", "latitude": 28.721591666666665, "longitude": 115.88600277777779}, {"filename": "IMG_20240118_204630.jpg", "latitude": 34.18738055555555, "longitude": 108.85822499999999}, {"filename": "IMG_20240301_145141.jpg", "latitude": 31.23975, "longitude": 121.48583333333333}]';

			var photoData = JSON.parse(json_data);

			var photoCoordinates = [];

			photoData.forEach(function (photo) {
				var img = new Image();
				img.onload = function () {
					//console.log('Image loaded:', photo.filename);
					// 在天地图上添加标记
					var marker = new T.Marker(new T.LngLat(photo.longitude, photo.latitude));
					map.addOverLay(marker);

					// 添加信息窗口
					var infoWindow = new T.InfoWindow('<img src="' + currentPath +
						photo.filename + '" width="200" height="150">');
					marker.addEventListener("click", function () {
						this.openInfoWindow(infoWindow);
					});
				};
				img.onerror = function () {
					console.error('Error loading image');
				};
				// 设置图片的 src 属性，触发图片加载
				img.src = currentPath + photo.filename;

				// 更新图片的范围
				photoCoordinates.push(new T.LngLat(photo.longitude, photo.latitude));
			});
			// 更新地图显示的范围
			map.setViewport(photoCoordinates);
		}
	</script>
</body>

</html>
